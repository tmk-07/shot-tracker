<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Basketball Shot Tracker</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #f8fafc;
      --muted: #94a3b8;
      --make: #16a34a;
      --miss: #dc2626;
      --reset: #334155;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      padding: 20px;
    }

    .app {
      width: min(100%, 420px);
      background: rgba(17, 24, 39, 0.96);
      backdrop-filter: blur(10px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .title {
      font-size: 1.7rem;
      font-weight: 800;
      margin: 0 0 8px;
      text-align: center;
    }

    .subtitle {
      margin: 0 0 22px;
      color: var(--muted);
      text-align: center;
      font-size: 0.98rem;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.04);
      border-radius: 18px;
      padding: 22px 18px;
      text-align: center;
      margin-bottom: 18px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .main-stat {
      font-size: 2.3rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      margin-bottom: 6px;
    }

    .sub-stat {
      color: var(--muted);
      font-size: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin: 18px 0 14px;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 18px;
      padding: 20px 16px;
      font-size: 1.2rem;
      font-weight: 800;
      color: white;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.15s ease;
      min-height: 86px;
      touch-action: manipulation;
    }

    button:active {
      transform: scale(0.98);
    }

    .make {
      background: var(--make);
    }

    .miss {
      background: var(--miss);
    }

    .secondary-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 8px;
    }

    .secondary {
      background: var(--reset);
      min-height: 58px;
      font-size: 0.98rem;
      font-weight: 700;
      border-radius: 14px;
    }

    .tiny-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 18px;
    }

    .tiny-box {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      padding: 12px 8px;
      text-align: center;
    }

    .tiny-label {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .tiny-value {
      font-size: 1.1rem;
      font-weight: 800;
    }

    .footer {
      margin-top: 16px;
      text-align: center;
      color: var(--muted);
      font-size: 0.82rem;
    }
  </style>
</head>
<body>
  <main class="app">
    <h1 class="title">🏀 Shot Tracker</h1>
    <p class="subtitle">Tap make or miss. Your totals save automatically on this device.</p>

    <section class="stat-card">
      <div id="mainStat" class="main-stat">0 / 0</div>
      <div id="subStat" class="sub-stat">FG%: 0.0%</div>
    </section>

    <section class="grid">
      <button class="make" id="makeBtn">MAKE</button>
      <button class="miss" id="missBtn">MISS</button>
    </section>

    <section class="secondary-row">
      <button class="secondary" id="undoBtn">Undo Last</button>
      <button class="secondary" id="resetBtn">Reset</button>
    </section>

    <section class="tiny-stats">
      <div class="tiny-box">
        <div class="tiny-label">Makes</div>
        <div id="makesValue" class="tiny-value">0</div>
      </div>
      <div class="tiny-box">
        <div class="tiny-label">Misses</div>
        <div id="missesValue" class="tiny-value">0</div>
      </div>
      <div class="tiny-box">
        <div class="tiny-label">Total</div>
        <div id="totalValue" class="tiny-value">0</div>
      </div>
    </section>

    <p class="footer">Works great as a home-screen app on iPhone or Android.</p>
  </main>

  <script>
    const STORAGE_KEY = 'shot-tracker-v1';

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return { makes: 0, misses: 0, history: [] };
      try {
        return JSON.parse(raw);
      } catch {
        return { makes: 0, misses: 0, history: [] };
      }
    }

    const state = loadState();

    const mainStat = document.getElementById('mainStat');
    const subStat = document.getElementById('subStat');
    const makesValue = document.getElementById('makesValue');
    const missesValue = document.getElementById('missesValue');
    const totalValue = document.getElementById('totalValue');

    document.getElementById('makeBtn').addEventListener('click', () => addShot('make'));
    document.getElementById('missBtn').addEventListener('click', () => addShot('miss'));
    document.getElementById('undoBtn').addEventListener('click', undoLast);
    document.getElementById('resetBtn').addEventListener('click', resetAll);

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function addShot(type) {
      if (type === 'make') state.makes += 1;
      if (type === 'miss') state.misses += 1;
      state.history.push(type);
      saveState();
      render();
    }

    function undoLast() {
      const last = state.history.pop();
      if (!last) return;
      if (last === 'make' && state.makes > 0) state.makes -= 1;
      if (last === 'miss' && state.misses > 0) state.misses -= 1;
      saveState();
      render();
    }

    function resetAll() {
      const ok = confirm('Reset all shots?');
      if (!ok) return;
      state.makes = 0;
      state.misses = 0;
      state.history = [];
      saveState();
      render();
    }

    function render() {
      const total = state.makes + state.misses;
      const pct = total === 0 ? 0 : (state.makes / total) * 100;

      mainStat.textContent = `${state.makes} / ${total}`;
      subStat.textContent = `FG%: ${pct.toFixed(1)}%`;
      makesValue.textContent = state.makes;
      missesValue.textContent = state.misses;
      totalValue.textContent = total;
    }

    render();
  </script>
</body>
</html>
